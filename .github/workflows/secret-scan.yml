name: Secret scan

# Runs on the whole repo (no path filter): a leaked secret can land in any file,
# not just documentai-api/**. Uses the gitleaks binary directly rather than the
# gitleaks-action, which requires a paid license for GitHub organizations.

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.30.1
      # SHA256 of gitleaks_8.30.1_linux_x64.tar.gz, pinned so a tampered/swapped
      # release asset is rejected (defense beyond TLS + version pinning).
      # When bumping GITLEAKS_VERSION, update this too from that version's
      # gitleaks_<version>_checksums.txt, or the install step will (correctly) fail.
      GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so the scan covers every commit, not just the tip.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan
        # Picks up .gitleaks.toml at the repo root automatically. Exits non-zero
        # (failing the job) if any leak is found. --redact keeps secrets out of logs.
        run: gitleaks detect --source . --log-opts="--all" --redact --verbose
