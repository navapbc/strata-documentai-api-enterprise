name: CI admin-ui

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - ui/admin/**
      - ui/shared/**
      - .github/workflows/ci-admin-ui.yml
  pull_request:
    paths:
      - ui/admin/**
      - ui/shared/**
      - .github/workflows/ci-admin-ui.yml

concurrency:
  group: ci-admin-ui-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: ./ui/admin

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ui/admin/.nvmrc
          cache: npm
          cache-dependency-path: ui/admin/package-lock.json

      - run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
