<header class="login-header">
  <div class="login-header-inner">
    <strong>DocumentAI Console</strong>
  </div>
</header>
<div class="pending-layout">
  <div class="pending-card">
    <h1>Account pending approval</h1>
    <p>
      Thanks for signing up. Your account is waiting for an administrator to approve it and assign
      your role.
    </p>
    <p>
      You'll get access as soon as that happens. If you need this sooner, reach out to your
      administrator.
    </p>
    <p class="pending-signed-in-as">Signed in as <strong id="pending-email"></strong></p>
    <button id="pending-logout-btn" class="btn-secondary btn-block">Log out</button>
  </div>
</div>
