<table id="categories-table">
  <thead>
    <tr>
      <th data-col="tenantId">Tenant</th>
      <th data-col="categoryName">Name</th>
      <th data-col="displayName">Display Name</th>
      <th data-col="description">Description</th>
      <th>Status</th>
      <th style="width: 1px; white-space: nowrap">Actions</th>
    </tr>
  </thead>
  <tbody id="categories-tbody"></tbody>
</table>
<p id="no-categories" class="empty-state hidden">No categories found.</p>

<!-- Create/Edit Category Modal -->
<div id="category-modal" class="modal hidden">
  <div class="modal-content">
    <h2 id="category-modal-title">Create category</h2>
    <form id="category-form">
      <label for="category-tenant">Tenant</label>
      <select id="category-tenant" required>
        <option value="">- Select tenant -</option>
      </select>

      <label for="category-name">Category name</label>
      <p class="field-hint">Lowercase letters, numbers, dashes, and underscores only.</p>
      <input
        type="text"
        id="category-name"
        placeholder="e.g. income"
        required
        pattern="[a-z0-9_\-]+"
      />

      <label for="category-display-name">Display name</label>
      <input type="text" id="category-display-name" placeholder="Income Documents" required />

      <label for="category-description">Description (optional)</label>
      <input type="text" id="category-description" placeholder="W2s, 1099s, pay stubs" />

      <p id="category-form-error" class="error hidden"></p>

      <div class="modal-actions">
        <button type="button" id="category-cancel" class="btn-secondary">Cancel</button>
        <button type="submit" class="btn-primary">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- Deactivate Category Modal -->
<div id="category-deactivate-modal" class="modal hidden">
  <div class="modal-content">
    <h2>Deactivate Category</h2>
    <p>
      This will deactivate the category <strong id="deactivate-category-name"></strong>. Documents
      already assigned to this category will not be affected.
    </p>
    <p id="category-deactivate-error" class="error hidden"></p>
    <div class="modal-actions">
      <button type="button" id="category-deactivate-cancel" class="btn-secondary">Cancel</button>
      <button type="button" id="category-deactivate-confirm" class="btn-danger">Deactivate</button>
    </div>
  </div>
</div>
