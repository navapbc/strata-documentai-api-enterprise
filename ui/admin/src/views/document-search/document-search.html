<div class="documents-three-panel detail-collapsed">
  <div class="documents-list-panel">
    <div class="documents-filter-bar">
      <div class="documents-search-row">
        <input
          type="text"
          id="document-search-input"
          placeholder="Search by file name or Job ID…"
        />
        <button type="button" id="document-search-btn" class="btn-icon" title="Search">🔍</button>
      </div>
      <select id="document-status-filter">
        <option value="">All statuses</option>
        <option value="success">Success</option>
        <option value="no_custom_blueprint_matched">No Blueprint Matched</option>
        <option value="failed">Failed</option>
        <option value="conversion_failed">Conversion Failed</option>
        <option value="blurry_document_detected">Blurry Document</option>
        <option value="no_document_detected">No Document Detected</option>
        <option value="password_protected">Password Protected</option>
        <option value="started">Processing</option>
        <option value="not_started">Pending</option>
        <option value="deleted">Deleted</option>
      </select>
    </div>
    <p id="no-documents" class="empty-state">Search for documents by file name or Job ID</p>
    <ul id="documents-list" class="documents-compact-list"></ul>
  </div>
  <div class="documents-preview-panel" id="document-preview-panel">
    <p class="empty-state">Select a document to preview</p>
  </div>
  <div class="documents-detail-panel collapsed" id="document-detail-panel">
    <button id="detail-collapse-btn" class="detail-collapse-btn" title="Expand details">❮</button>
    <div id="detail-content"></div>
  </div>
</div>
