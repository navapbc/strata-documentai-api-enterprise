<div class="layout">
  <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Open menu">☰</button>
  <aside class="sidebar">
    <div class="sidebar-header">
      <button id="sidebar-close" class="sidebar-close" aria-label="Close menu">✕</button>
      <h1>DocumentAI Enterprise Console</h1>
      <span id="connected-url"></span>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section">
        <button class="nav-section-header" data-section="keys">
          <span class="nav-arrow">▸</span> API Keys
        </button>
        <div class="nav-section-body hidden" id="section-keys">
          <a class="nav-item" data-view="keys">Manage API Keys</a>
        </div>
      </div>

      <div class="nav-section hidden" id="nav-section-users">
        <button class="nav-section-header" data-section="users">
          <span class="nav-arrow">▸</span> Users
        </button>
        <div class="nav-section-body hidden" id="section-users">
          <a class="nav-item" data-view="users">Manage Users</a>
        </div>
      </div>

      <div class="nav-section hidden" id="nav-section-tenants">
        <button class="nav-section-header" data-section="tenants">
          <span class="nav-arrow">▸</span> Tenants
        </button>
        <div class="nav-section-body hidden" id="section-tenants">
          <a class="nav-item" data-view="tenants">Manage Tenants</a>
        </div>
      </div>

      <div class="nav-section">
        <button class="nav-section-header" data-section="docs">
          <span class="nav-arrow">▸</span> Documents
        </button>
        <div class="nav-section-body hidden" id="section-docs">
          <a class="nav-item" data-view="doc-categories">Manage Document Categories</a>
          <a class="nav-item" data-view="extraction-rules">Manage Extraction Rules</a>
          <a class="nav-item" data-view="test-documents">Test Document Extraction</a>
          <a class="nav-item" data-view="documents">Recently Processed</a>
          <!-- <a class="nav-item" data-view="document-search">Search Documents</a> TODO: wire up backend search (FilterExpression on tenant index or similar) -->
        </div>
      </div>

      <div class="nav-section">
        <button class="nav-section-header" data-section="audit-log">
          <span class="nav-arrow">▸</span> Audit Log
        </button>
        <div class="nav-section-body hidden" id="section-audit-log">
          <a class="nav-item" data-view="audit-log">View Audit Log Events</a>
        </div>
      </div>

      <div class="nav-section">
        <button class="nav-section-header" data-section="reporting">
          <span class="nav-arrow">▸</span> Reporting
        </button>
        <div class="nav-section-body hidden" id="section-reporting">
          <a class="nav-item" data-view="usage">Usage Tracking</a>
        </div>
      </div>
    </nav>

    <div class="sidebar-footer">
      <button id="logout-btn" class="btn-secondary btn-block">Log Out</button>
    </div>
  </aside>

  <div class="content-header">
    <h2 id="view-title"></h2>
    <div id="view-actions" class="content-actions"></div>
  </div>
  <div class="tenant-filter-bar">
    <label for="global-tenant-select">Tenant</label>
    <select id="global-tenant-select">
      <option value="">All Tenants</option>
    </select>
  </div>
  <main id="main-content" class="main-content"></main>
</div>
