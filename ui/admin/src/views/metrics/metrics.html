<div class="metrics-view">
  <div class="metrics-controls">
    <div class="usage-field">
      <label for="metrics-start">Start</label>
      <input type="date" id="metrics-start" />
    </div>
    <div class="usage-field">
      <label for="metrics-end">End</label>
      <input type="date" id="metrics-end" />
    </div>
    <button id="metrics-load-btn" class="btn-primary">Load</button>
  </div>
  <div id="metrics-cards" class="metrics-cards"></div>
  <div class="metrics-panels">
    <div id="metrics-status" class="metrics-panel"></div>
    <div id="metrics-codes" class="metrics-panel"></div>
  </div>
  <div id="metrics-classification" class="metrics-panel"></div>
  <p id="metrics-empty" class="empty-state hidden"></p>
</div>
