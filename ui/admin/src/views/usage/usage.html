<div class="usage-view">
  <div class="usage-controls">
    <label for="usage-month">Month</label>
    <input type="month" id="usage-month" />
    <label for="usage-granularity">Granularity</label>
    <select id="usage-granularity">
      <option value="monthly">Monthly</option>
      <option value="daily">Daily</option>
    </select>
    <button id="usage-download-btn" class="btn-secondary">Download CSV</button>
  </div>
  <div id="usage-table-container">
    <p id="usage-empty" class="empty-state">Loading...</p>
  </div>
</div>
